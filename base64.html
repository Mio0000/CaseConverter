<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Base64 Encoder / Decoder — Free Developer Tool</title>
<meta name="description" content="Encode or decode Base64 strings instantly. Free, lightweight, no sign-up required.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;
  --text:#e2e8f0;--muted:#6b7280;--accent:#7c3aed;
  --green:#10b981;--red:#ef4444;--mono:'SF Mono','Fira Code','Consolas',monospace
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 48px}
nav{width:100%;max-width:960px;display:flex;flex-wrap:wrap;gap:0;margin-bottom:40px;border-bottom:1px solid var(--border);padding-top:32px}
nav a{padding:10px 18px;font:inherit;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
nav a:hover{color:var(--text)}
nav a.active{color:var(--accent);border-bottom-color:var(--accent)}
h1{font-size:1.1rem;letter-spacing:.15em;color:var(--muted);margin-bottom:28px;text-transform:uppercase;width:100%;max-width:960px}
h1 span{color:var(--accent)}
#controls{width:100%;max-width:960px;display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.fmt-btn{padding:6px 14px;font:inherit;font-size:.75rem;letter-spacing:.04em;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;transition:all .1s;white-space:nowrap}
.fmt-btn:hover{border-color:var(--accent);color:var(--accent)}
.fmt-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.btn{padding:6px 16px;font:inherit;font-size:.78rem;letter-spacing:.04em;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;transition:all .1s;white-space:nowrap}
.btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.ok{border-color:var(--green);color:var(--green)}
.btn-clear{margin-left:auto}
#panels{width:100%;max-width:960px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){#panels{grid-template-columns:1fr}}
.panel-label{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
textarea{width:100%;height:300px;padding:12px 14px;font:0.82rem var(--mono);background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;resize:vertical;transition:border .15s;line-height:1.6}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted);font-size:.78rem}
#output-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;min-height:300px;overflow:auto}
#output{font-size:.82rem;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--text);font-family:var(--mono)}
#output.empty{color:var(--muted);font-style:italic;white-space:normal;font-size:.78rem}
#output.error{color:var(--red)}
#copy-row{display:flex;gap:10px;margin-top:10px}
#stats{width:100%;max-width:960px;margin-top:10px;font-size:.72rem;color:var(--muted);height:18px}
#stats b{color:var(--accent)}
footer{margin-top:40px;font-size:.7rem;color:#3a3d4a;width:100%;max-width:960px}
</style>
</head>
<body>
<nav>
  <a href="index.html">Case Converter</a>
  <a href="table.html">Table</a>
  <a href="json.html">JSON Keys</a>
  <a href="base64.html" class="active">Base64</a>
  <a href="url.html">URL Encode</a>
  <a href="jwt.html">JWT</a>
  <a href="timestamp.html">Timestamp</a>
  <a href="color.html">Color</a>
</nav>

<h1>Base64 <span>Encoder / Decoder</span></h1>

<div id="controls">
  <button class="fmt-btn active" data-mode="encode">Encode → Base64</button>
  <button class="fmt-btn" data-mode="decode">Decode → Text</button>
  <button class="btn btn-clear" id="btn-clear">Clear</button>
</div>

<div id="panels">
  <div>
    <div class="panel-label" id="in-label">Text input</div>
    <textarea id="inp" placeholder="Type or paste text to encode…" spellcheck="false"></textarea>
  </div>
  <div>
    <div class="panel-label" id="out-label">Base64 output</div>
    <div id="output-wrap">
      <pre id="output" class="empty">Output will appear here…</pre>
    </div>
    <div id="copy-row">
      <button class="btn" id="btn-copy">Copy to Clipboard</button>
    </div>
  </div>
</div>

<div id="stats"></div>
<footer>no framework · no deps · ~2 KB</footer>

<script>
(function(){
  const inp     = document.getElementById('inp');
  const output  = document.getElementById('output');
  const stats   = document.getElementById('stats');
  const inLabel = document.getElementById('in-label');
  const outLabel= document.getElementById('out-label');
  const btnCopy = document.getElementById('btn-copy');
  const btnClr  = document.getElementById('btn-clear');

  let mode = 'encode';

  function encode(s){
    try{ return btoa(unescape(encodeURIComponent(s))); }
    catch(e){ return null; }
  }
  function decode(s){
    try{ return decodeURIComponent(escape(atob(s.replace(/\s/g,'')))); }
    catch(e){ return null; }
  }

  function update(){
    const raw = inp.value;
    if(!raw.trim()){
      output.textContent = 'Output will appear here…';
      output.className = 'empty';
      stats.innerHTML = '';
      return;
    }
    const result = mode === 'encode' ? encode(raw) : decode(raw);
    if(result === null){
      output.textContent = mode === 'decode' ? 'Invalid Base64 input.' : 'Encoding error.';
      output.className = 'error';
      stats.innerHTML = '';
    } else {
      output.textContent = result;
      output.className = '';
      stats.innerHTML = `<b>${raw.length}</b> chars in → <b>${result.length}</b> chars out`;
    }
  }

  document.querySelectorAll('.fmt-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      mode = this.dataset.mode;
      if(mode === 'encode'){
        inLabel.textContent  = 'Text input';
        outLabel.textContent = 'Base64 output';
        inp.placeholder = 'Type or paste text to encode…';
      } else {
        inLabel.textContent  = 'Base64 input';
        outLabel.textContent = 'Decoded text';
        inp.placeholder = 'Paste Base64 string to decode…';
      }
      update();
    });
  });

  inp.addEventListener('input', update);

  btnClr.addEventListener('click',()=>{ inp.value=''; update(); inp.focus(); });

  btnCopy.addEventListener('click',()=>{
    const txt = output.textContent;
    if(!txt || output.classList.contains('empty') || output.classList.contains('error')) return;
    navigator.clipboard.writeText(txt).then(()=>{
      btnCopy.textContent='Copied!'; btnCopy.classList.add('ok');
      setTimeout(()=>{ btnCopy.textContent='Copy to Clipboard'; btnCopy.classList.remove('ok'); },1400);
    });
  });

  inp.focus();
})();
</script>
</body>
</html>
